<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Glossaire | L'art des textiles japonais</title>
    <meta
      name="description"
      content="Consultez le glossaire des textiles japonais et recherchez un terme, une technique, un motif ou une teinture traditionnelle."
    />

    <meta
      property="og:title"
      content="Glossaire | L'art des textiles japonais"
    />
    <meta
      property="og:description"
      content="Explorez le glossaire des textiles japonais grâce au moteur de recherche et aux catégories."
    />
    <meta property="og:image" content="images/og-image.jpg" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <section class="tradition-section">
        <div class="custom-container tradition-content">
          <h1>Glossaire</h1>
          <p>
            Recherchez un terme, une technique ou un motif lié à l’univers des
            textiles japonais.
          </p>
        </div>
      </section>

      <section class="search-section">
        <div class="search-toolbar">
          <div class="search-input-box">
            <img src="svg/loupe.svg" alt="" aria-hidden="true" />
            <label for="searchInput" class="visually-hidden"
              >Recherche un terme</label
            >
            <input
              type="search"
              id="searchInput"
              class="search-input-field no-border-input"
              placeholder="Recherche un terme"
            />
          </div>

          <div
            class="search-categories"
            role="group"
            aria-label="Filtrer par catégorie"
          >
            <button type="button" class="category-filter" data-category="tous">
              Tous
            </button>
            <button
              type="button"
              class="category-filter"
              data-category="motifs"
            >
              Motifs
            </button>
            <button
              type="button"
              class="category-filter"
              data-category="tissages"
            >
              Tissages
            </button>
            <button
              type="button"
              class="category-filter"
              data-category="teinture"
            >
              Teinture & Décors
            </button>
            <button
              type="button"
              class="category-filter"
              data-category="generale"
            >
              Générale
            </button>
          </div>
        </div>

        <div id="resultsInfo" class="results-info" aria-live="polite"></div>
        <div id="resultsContainer" class="results-grid"></div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
