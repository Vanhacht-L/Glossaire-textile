<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiche textile | L'art des textiles japonais</title>
    <meta
      name="description"
      content="Découvrez une fiche détaillée sur un textile japonais."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <section id="ficheHero" class="hero-section hero-section-textile">
        <div class="custom-container">
          <div class="hero-content">
            <h1 id="ficheTitle">Titre</h1>
            <h2 id="ficheSubtitle">Sous-titre</h2>
            <p id="ficheCategoryText">Catégorie</p>
          </div>
        </div>
      </section>

      <section class="fiche-section py-5">
        <div class="custom-container">
          <div class="row g-4 align-items-start">
            <div class="col-12 col-lg-6">
              <img
                id="ficheImage"
                src=""
                alt=""
                class="img-fluid rounded-4 fiche-image"
              />
            </div>

            <div class="col-12 col-lg-6">
              <span id="ficheBadge" class="result-badge mb-4">Catégorie</span>
              <p id="ficheDescription" class="fiche-description">
                Description complète
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
