<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Motifs | L'art des textiles japonais</title>
    <meta
      name="description"
      content="Découvrez les motifs symboliques des textiles japonais et leur signification dans l'art textile traditionnel."
    />

    <meta property="og:title" content="Motifs | L'art des textiles japonais" />
    <meta
      property="og:description"
      content="Explorez les motifs symboliques et traditionnels des textiles japonais."
    />
    <meta property="og:image" content="images/og-image.jpg" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preload" href="css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="css/style.css"></noscript>
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <section class="hero-section-motifs">
        <div class="custom-container">
          <div class="row">
            <div class="col-12 col-md-10 col-lg-8">
              <div class="hero-content">
                <h1>Motifs</h1>
                <h2>模様 - Moyō</h2>
                <p>
                  Découvrez les motifs symboliques présents dans les textiles
                  japonais.
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="tradition-section">
        <div class="custom-container tradition-content">
          <h2>Explorer les motifs</h2>
          <p>Recherchez un motif ou un terme lié aux textiles japonais.</p>
        </div>
      </section>

      <section class="search-section">
        <div class="search-toolbar">
          <div class="search-input-box">
            <img src="svg/loupe.svg" alt="" aria-hidden="true" />
            <label for="searchInput" class="visually-hidden"
              >Recherche un terme</label
            >
            <input
              type="search"
              id="searchInput"
              class="search-input-field no-border-input"
              placeholder="Recherche un terme"
            />
          </div>
        </div>

        <div id="resultsInfo" class="results-info" aria-live="polite"></div>
        <div id="resultsContainer" class="results-grid"></div>
      </section>
    </main>
    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
