<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Teinture & décoration | L'art des textiles japonais</title>
    <meta
      name="description"
      content="Découvrez les techniques japonaises de teinture et les procédés décoratifs traditionnels du textile."
    />

    <meta
      property="og:title"
      content="Teinture & décoration | L'art des textiles japonais"
    />
    <meta
      property="og:description"
      content="Explorez les techniques japonaises de teinture et de décoration textile."
    />
    <meta property="og:image" content="images/og-image.jpg" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
    href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@700&display=swap"
    rel="stylesheet">


    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <section class="hero-section-teinture">
        <div class="custom-container">
          <div class="row">
            <div class="col-12 col-md-10 col-lg-8">
              <div class="hero-content">
                <h1>Teinture</h1>
                <h2>染め - Somé</h2>
                <p>
                  Découvrez les techniques traditionnelles de teinture
                  japonaise.
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Bloc 4 : recherche -->

      <section class="tradition-section">
        <div class="custom-container tradition-content">
          <h2>Explorer les techniques de teinture</h2>
          <p>
            Recherchez une technique ou un terme lié à la teinture japonaise.
          </p>
        </div>
      </section>

      <section class="search-section">
        <div class="search-toolbar">
          <div class="search-input-box">
            <img src="svg/loupe.svg" alt="" aria-hidden="true" />
            <label for="searchInput" class="visually-hidden"
              >Recherche un terme</label
            >
            <input
              type="search"
              id="searchInput"
              class="search-input-field no-border-input"
              placeholder="Recherche un terme"
            />
          </div>
        </div>

        <div id="resultsInfo" class="results-info" aria-live="polite"></div>
        <div id="resultsContainer" class="results-grid"></div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
